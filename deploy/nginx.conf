server {
    listen 80;
    server_name officeshichang.icu www.officeshichang.icu 101.133.160.196;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name officeshichang.icu www.officeshichang.icu 101.133.160.196;

    # SSL 证书配置
    ssl_certificate /www/server/panel/vhost/cert/officeshichang.icu/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/officeshichang.icu/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 项目根目录
    root /www/wwwroot/www.officeshichang.icu;
    index index.html;

    # 前端页面
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI 接口反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }
}
